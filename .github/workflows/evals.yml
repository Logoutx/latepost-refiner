name: Model Evals

on:
  workflow_dispatch:
  schedule:
    # Monday 04:05 Asia/Shanghai.
    - cron: "5 20 * * 0"

permissions:
  contents: read

jobs:
  evals:
    name: Golden Evals
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Produce and score eval outputs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY secret is not configured; skipping model evals."
            exit 0
          fi
          mkdir -p eval-results
          node eval/produce.mjs --suite filler --out eval-results/filler.json
          node eval/run.mjs eval-results/filler.json
          node eval/produce.mjs --suite golden --out eval-results/golden.json
          node eval/golden-run.mjs eval-results/golden.json

      - name: Upload eval outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval-results/
          if-no-files-found: ignore
