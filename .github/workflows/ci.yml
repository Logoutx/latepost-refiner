name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # One drift mechanism for EVERY vendored copy (audit_refined.mjs ×2, core/spec.js, core/prompts.js,
      # universal/artifacts.js, references/editorial-spec.md) — replaces the old per-file `cmp` backstops.
      - name: Check vendored copies in sync
        run: node build/sync-skills.mjs --check

      - name: Run tests
        run: npm test

      - name: Rebuild Claude Code workflow
        run: npm run build:cc

      - name: Check whitespace
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          else
            git diff --check "${{ github.event.before }}..HEAD"
          fi

      # Catches un-regenerated build artifacts: workflow.js (build:cc) or a vendored copy committed out of
      # sync with its source (the sync --check step above already fails on the latter).
      - name: Check for un-regenerated artifacts
        run: git diff --exit-code

  package:
    name: Package release zips
    needs: verify
    if: github.event_name == 'push'
    # macOS runner is load-bearing: build-binary.sh ad-hoc codesigns the compiled binaries
    # (arm64 Macs kill unsigned executables) and codesign only exists on macOS.
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci

      - name: Rebuild Claude Code workflow
        run: npm run build:cc

      - name: Build the per-edition release zips
        run: bash build/build-release-zip.sh "$PWD/dist-zips"

      # The release page's auto-generated "Source code" archives (and the commit shown in its header)
      # come from the tag, not the uploaded asset — move the rolling tag to this commit so they match.
      - name: Move the rolling "latest" tag to this commit
        run: git push origin +HEAD:refs/tags/latest

      - name: Publish to the rolling "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create latest --title "Latest build" --notes placeholder 2>/dev/null || true
          gh release edit latest \
            --title "Latest build" \
            --notes "Auto-built from main on every push. 按模型下载：latepost-refiner-claude-skill.zip（拖进 ~/.claude/skills/）；latepost-refiner-codex-skill.zip（拖进 Codex 技能目录）；latepost-refiner-deepseek-mac.zip（Mac 免安装：解压后右键打开 启动.command，Apple Silicon / Intel 自动适配，不需要 Node/Homebrew）。"
          gh release upload latest \
            dist-zips/latepost-refiner-claude-skill.zip \
            dist-zips/latepost-refiner-codex-skill.zip \
            dist-zips/latepost-refiner-deepseek-mac.zip \
            --clobber
          # retire the old single all-in-one asset
          gh release delete-asset latest latepost-refiner.zip --yes 2>/dev/null || true
