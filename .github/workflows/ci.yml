name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # One drift mechanism for EVERY vendored copy (audit_refined.mjs ×2, core/spec.js, core/prompts.js,
      # universal/artifacts.js, references/editorial-spec.md) — replaces the old per-file `cmp` backstops.
      - name: Check vendored copies in sync
        run: node build/sync-skills.mjs --check

      - name: Run tests
        run: npm test

      - name: Rebuild Claude Code workflow
        run: npm run build:cc

      - name: Check whitespace
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          else
            git diff --check "${{ github.event.before }}..HEAD"
          fi

      # Catches un-regenerated build artifacts: workflow.js (build:cc) or a vendored copy committed out of
      # sync with its source (the sync --check step above already fails on the latter).
      - name: Check for un-regenerated artifacts
        run: git diff --exit-code

  package:
    name: Package skill zip
    needs: verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild Claude Code workflow
        run: npm run build:cc

      - name: Build the skill zip
        run: bash claude-code-skill/build-zips.sh "$PWD/dist-zips"

      - name: Publish to the rolling "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create latest \
            --title "Latest skill build" \
            --notes "Auto-built from main on every push — download latepost-refiner.zip below." \
            2>/dev/null || true
          gh release upload latest dist-zips/latepost-refiner.zip --clobber
