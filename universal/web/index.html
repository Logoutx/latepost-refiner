<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>访谈转录精校 · 本地版</title>
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#f6f5f2" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#16140f" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="访谈精校">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
  :root {
    --bg: #f6f5f2; --card: #fffefb; --ink: #1c1a17; --muted: #6b6660; --line: #e3ded6;
    --accent: #b4532a; --accent-ink: #fff; --ok: #2f7d4f; --warn: #b07203; --err: #b3261e;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, "PingFang SC", "Segoe UI", system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#16140f; --card:#211e18; --ink:#ece7df; --muted:#9a948a; --line:#34302a;
            --accent:#d9784e; --ok:#5fb27e; --warn:#d6a24a; --err:#e07a72; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); line-height: 1.5; }
  .wrap { max-width: 860px; margin: 0 auto; padding: 28px 20px 80px; }
  header h1 { font-size: 22px; margin: 0 0 4px; letter-spacing: .2px; }
  header p { margin: 0; color: var(--muted); font-size: 13px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 18px 18px 20px; margin-top: 18px; }
  .card h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin: 0 0 14px; font-weight: 600; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 12px 0 5px; }
  label .opt { color: var(--muted); font-weight: 400; }
  input[type=text], input[type=password], input[type=number], select, textarea {
    width: 100%; padding: 9px 11px; border: 1px solid var(--line); border-radius: 8px;
    background: var(--bg); color: var(--ink); font: inherit; font-size: 14px;
  }
  textarea { resize: vertical; min-height: 56px; }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .hint { font-size: 12px; color: var(--muted); margin: 5px 0 0; }
  .checks { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 6px; }
  .checks label { display: inline-flex; align-items: center; gap: 6px; margin: 0; font-weight: 500; }
  .checks input { width: auto; }
  .filebox { border: 1.5px dashed var(--line); border-radius: 10px; padding: 16px; text-align: center; cursor: pointer; color: var(--muted); font-size: 13px; }
  .filebox.has { border-style: solid; color: var(--ink); text-align: left; }
  .filebox b { color: var(--ink); }
  #fileList { margin: 8px 0 0; padding: 0; list-style: none; font-size: 13px; }
  #fileList li { padding: 2px 0; color: var(--muted); }
  .actions { display: flex; align-items: center; gap: 14px; margin-top: 20px; }
  button.run { background: var(--accent); color: var(--accent-ink); border: none; border-radius: 9px; padding: 11px 22px; font: inherit; font-weight: 600; font-size: 15px; cursor: pointer; }
  button.run:disabled { opacity: .5; cursor: default; }
  button.ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 8px; padding: 8px 14px; font: inherit; font-size: 13px; cursor: pointer; }
  details summary { cursor: pointer; font-size: 13px; color: var(--muted); font-weight: 600; }
  details[open] summary { margin-bottom: 8px; }
  #console { font-family: var(--mono); font-size: 12.5px; background: #0e0d0b; color: #d7cfc2; border-radius: 10px; padding: 14px; height: 240px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
  #console .ph { color: #e0925f; font-weight: 700; }
  #console .er { color: #ef8d84; }
  #result { font-size: 14px; }
  #result .ok { color: var(--ok); } #result .warn { color: var(--warn); } #result .er { color: var(--err); }
  #result h3 { font-size: 14px; margin: 14px 0 6px; }
  #result ul { margin: 4px 0; padding-left: 20px; } #result li { margin: 2px 0; }
  code { font-family: var(--mono); font-size: 12.5px; background: var(--bg); padding: 1px 5px; border-radius: 4px; }
  .pill { display: inline-block; font-size: 11px; padding: 1px 8px; border-radius: 99px; border: 1px solid var(--line); color: var(--muted); margin-left: 8px; }
  .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; margin-bottom: 14px; }
  .segbtn { background: var(--bg); color: var(--muted); border: none; padding: 7px 16px; font: inherit; font-size: 13px; font-weight: 600; cursor: pointer; }
  .segbtn.on { background: var(--accent); color: var(--accent-ink); }
  .modelbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
  .modelbar .hint { margin: 0; flex: 1 1 220px; }
  .catrow { display: grid; grid-template-columns: 200px 1fr; gap: 10px 12px; align-items: start; padding: 12px 0; border-top: 1px solid var(--line); }
  .catrow:first-child { border-top: none; }
  .catlabel { font-size: 13px; font-weight: 600; padding-top: 8px; }
  .catlabel .opt { display: block; font-weight: 400; font-size: 11px; }
  .catfields { display: grid; gap: 8px; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>访谈转录精校 <span class="pill">本地</span></h1>
    <p>清理口语、统一名词、保留事实。</p>
  </header>

  <div class="card">
    <h2>模型</h2>
    <div class="seg">
      <button type="button" class="segbtn on" data-mode="single">单一服务商</button>
      <button type="button" class="segbtn" data-mode="mixed">按任务分配</button>
    </div>

    <div id="paneSingle">
      <div class="row">
        <div>
          <label>服务商</label>
          <select id="provider"></select>
          <p class="hint" id="providerNote"></p>
        </div>
        <div>
          <label>API Key <span class="opt" id="keyHint"></span></label>
          <input type="password" id="apiKey" placeholder="仅本次使用，不保存" autocomplete="off">
        </div>
      </div>
      <label style="margin-top:14px">联网核实 <span class="opt">精校不联网</span></label>
      <input type="password" id="tavilyKey" placeholder="Tavily API Key" autocomplete="off">
      <p class="hint" id="searchNote"></p>
      <details style="margin-top:12px">
        <summary>高级设置</summary>
        <label>Endpoint <span class="opt">可选</span></label>
        <input type="text" id="baseURL" placeholder="">
        <label>模型分层 <span class="opt">自动填入，可编辑</span></label>
        <input type="text" id="models" placeholder="">
        <div class="modelbar">
          <button type="button" class="ghost" id="fetchModels">更新模型</button>
          <span class="hint" id="modelFetchStatus"></span>
        </div>
        <p class="hint" id="modelHint"></p>
      </details>
    </div>

    <div id="paneMixed" class="hidden">
      <p class="hint">按任务分配不同服务商。留空的任务使用默认设置。</p>
      <p class="hint">联网核实若使用 DeepSeek / OpenAI，需要 Tavily。</p>
      <div class="row">
        <div><label>默认服务商</label><select id="defProvider"></select></div>
        <div><label>默认 API Key</label><input type="password" id="defKey" placeholder="用于留空任务" autocomplete="off"></div>
      </div>
      <div class="modelbar">
        <button type="button" class="ghost" id="fetchMixedModels">更新默认模型</button>
        <span class="hint" id="mixModelHint"></span>
      </div>
      <div id="catRows" style="margin-top:8px"></div>
      <details style="margin-top:10px">
        <summary>联网核实密钥</summary>
        <label>Tavily API Key <span class="opt">DeepSeek / OpenAI 需要</span></label>
        <input type="password" id="mixTavily" placeholder="Tavily API Key" autocomplete="off">
      </details>
    </div>
  </div>

  <div class="card">
    <h2>输入</h2>
    <div class="filebox" id="filebox" tabindex="0">
      选择转录文件<br><span class="opt">.txt / .md / .docx / .pptx / .xlsx / .pdf</span>
    </div>
    <input type="file" id="files" multiple class="hidden"
           accept=".txt,.md,.docx,.pptx,.xlsx,.pdf,text/plain,text/markdown">
    <ul id="fileList"></ul>
    <div class="row" style="margin-top:8px">
      <div><label>主题 <span class="opt">用于文件名</span></label><input type="text" id="topic" placeholder="示例公司"></div>
      <div><label>采访时间 <span class="opt">YYYY-MM</span></label><input type="text" id="date" placeholder="2025-02"></div>
    </div>
    <label>背景 <span class="opt">给模型一点上下文</span></label>
    <textarea id="background" placeholder="例如：示例公司跨部门访谈，受访者负责渠道运营。"></textarea>
  </div>

  <div class="card">
    <h2>产出</h2>
    <label>交付内容</label>
    <div class="checks">
      <label><input type="checkbox" checked disabled> 精校稿</label>
      <label><input type="checkbox" value="logic"> 逻辑顺序稿</label>
      <label><input type="checkbox" value="summary"> 总结</label>
      <label><input type="checkbox" value="timeline"> 时间线</label>
    </div>
    <div class="row3" style="margin-top:12px">
      <div><label>联网核实</label><select id="verify"><option value="key">关键实体</option><option value="deep">尽量核全</option><option value="none">不联网</option></select></div>
      <div><label>小标题</label><select id="heading"><option value="none">自动生成</option><option value="keep">保留原文</option><option value="regenerate">重新生成</option></select></div>
      <div><label>并发 <span class="opt">可选</span></label><input type="number" id="concurrency" min="1" placeholder="自动"></div>
    </div>
    <label>输出位置 <span class="opt">留空用 Downloads/&lt;主题&gt;</span></label>
    <input type="text" id="out" placeholder="留空则保存到 ~/Downloads/<主题>">
    <div class="checks" style="margin-top:10px"><label><input type="checkbox" id="fresh"> 重新生成校对表</label><label title="把超过约 12000 字的文件拆成 2 块并行精校。多文件批量更快，但更费额度；单文件提升有限。"><input type="checkbox" id="chunkSpeed"> 大文件分块并行（提速·更费额度）</label></div>
  </div>

  <div class="actions">
    <button class="run" id="run">开始</button>
    <span class="hint" id="status"></span>
  </div>

  <div class="card" id="consoleCard" style="display:none">
    <h2>进度 <span id="elapsed" class="hint" style="font-variant-numeric:tabular-nums;font-weight:normal"></span></h2>
    <div id="console"></div>
  </div>

  <div class="card" id="resultCard" style="display:none">
    <h2>结果</h2>
    <div id="result"></div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id)
const API_TOKEN = window.__TRANSCRIBER_TOKEN__ || ''
const jsonHeaders = () => ({ 'Content-Type': 'application/json', 'X-Transcriber-Token': API_TOKEN })
let PROVIDERS = [], CATEGORIES = []
let picked = [] // {name, base64}
let mode = 'single'

const provOptions = (withDefault) => (withDefault ? '<option value="">默认</option>' : '') + PROVIDERS.map(p => `<option value="${p.name}">${p.label}</option>`).join('')
const hintModel = (tier) => tier === 'opus' ? 'claude-opus-4-8 / gpt-5.5' : tier === 'haiku' ? 'claude-haiku-4-5 / deepseek-chat' : 'claude-sonnet-4-6'
const STAGE_ORDER = ['scout', 'verify', 'dedup', 'refine', 'logic', 'summary', 'timeline']
const providerByName = (name) => PROVIDERS.find(p => p.name === name)
const uniq = (xs) => Array.from(new Set(xs.filter(Boolean)))
const modelIdsFor = (p) => uniq(((p && p.catalog) || []).map(m => m.id).concat(Object.values((p && p.models) || {})))
const stageMapping = (defaults) => STAGE_ORDER.map(k => defaults && defaults[k] ? `${k}=${defaults[k]}` : '').filter(Boolean).join(',')
const CAT_LABELS = { mechanical: '基础处理', web: '联网核实', correction: '术语去重', smart: '精校与总结' }
const STAGE_LABELS = { scout: '侦察', check: '核对', verify: '核实', dedup: '去重', refine: '精校', logic: '逻辑稿', summary: '总结', timeline: '时间线' }
const categoryTitle = (c) => CAT_LABELS[c.key] || c.label
const stageText = (stages) => (stages || []).map(s => STAGE_LABELS[s] || s).join(' · ')

function optionListFor(p) {
  return modelIdsFor(p).map(id => `<option value="${escAttr(id)}"></option>`).join('')
}

async function loadConfig() {
  const r = await fetch('/api/providers'); const j = await r.json()
  PROVIDERS = j.providers; CATEGORIES = j.categories || []
  $('provider').innerHTML = provOptions(false); $('provider').onchange = onProvider; onProvider()
  $('defProvider').innerHTML = provOptions(false)
  $('defProvider').onchange = () => { fetchDefaultMixedModels(false); refreshCategoryDefaults(true, true) }
  $('defKey').onblur = () => fetchDefaultMixedModels(false)
  $('apiKey').onblur = () => fetchSingleModels(false)
  $('baseURL').onblur = () => fetchSingleModels(false)
  $('models').oninput = () => { $('models').dataset.touched = '1' }
  $('fetchModels').onclick = () => fetchSingleModels(true)
  $('fetchMixedModels').onclick = () => fetchDefaultMixedModels(true)
  buildCatRows()
  document.querySelectorAll('.segbtn').forEach(b => b.onclick = () => setMode(b.dataset.mode))
}
function onProvider() {
  const p = PROVIDERS.find(x => x.name === $('provider').value) || {}
  $('keyHint').textContent = '（' + (p.keyEnv || []).join(' / ') + '）'
  $('providerNote').textContent = p.note || ''
  $('baseURL').placeholder = p.baseURL || '默认'
  $('tavilyKey').style.display = p.nativeSearch ? 'none' : 'block'
  $('searchNote').textContent = p.nativeSearch
    ? '已使用服务商自带搜索。'
    : '联网核实需要 Tavily；精校不联网。'
  $('modelHint').textContent = modelSuggest(p)
  $('modelFetchStatus').textContent = p.modelWarning || ''
  setSingleModelDefaults(false)
}
function modelSuggest(p) {
  if (!p.models && !p.costEffective) return ''
  const d = (p.costEffective && p.costEffective.stage) || {}
  const s = '推荐：精校/总结 ' + (d.refine || p.models.opus) + '；机械 ' + (d.scout || p.models.haiku) + '；核实 ' + (d.verify || p.models.sonnet) + '。'
  return p.modelNote ? (s + p.modelNote) : s
}
function setSingleModelDefaults(force) {
  const input = $('models')
  if (!force && input.dataset.touched) return
  const p = providerByName($('provider').value) || {}
  const mapping = stageMapping(p.costEffective && p.costEffective.stage)
  if (mapping) input.value = mapping
}
async function fetchModelsFor(providerName, apiKey, baseURL, statusEl) {
  const p = providerByName(providerName)
  if (!p) return null
  statusEl.textContent = apiKey ? '正在更新模型...' : '未填 API Key，使用内置推荐。'
  try {
    const resp = await fetch('/api/models', {
      method: 'POST',
      headers: jsonHeaders(),
      body: JSON.stringify({ provider: providerName, apiKey, baseURL }),
    })
    const data = await resp.json()
    if (!resp.ok) throw new Error(data.error || '更新失败')
    p.catalog = data.models || []
    p.costEffective = data.defaults || p.costEffective
    p.modelSource = data.source
    p.modelWarning = data.warning || ''
    statusEl.textContent = data.warning || ('已更新 ' + p.catalog.length + ' 个模型。')
    return p
  } catch (e) {
    statusEl.textContent = '模型更新失败：' + e.message
    return p
  }
}
async function fetchSingleModels(force) {
  const p = providerByName($('provider').value)
  if (!p) return
  await fetchModelsFor(p.name, $('apiKey').value.trim(), $('baseURL').value.trim(), $('modelFetchStatus'))
  $('modelHint').textContent = modelSuggest(p)
  setSingleModelDefaults(force)
}
async function fetchDefaultMixedModels(force) {
  const p = providerByName($('defProvider').value)
  if (!p) return
  await fetchModelsFor(p.name, $('defKey').value.trim(), '', $('mixModelHint'))
  refreshCategoryDefaults(force, true)
}
async function fetchCatModels(cat, force) {
  const explicitProvider = document.querySelector('.catProvider[data-cat="' + cat + '"]').value
  const provider = explicitProvider || $('defProvider').value
  const key = explicitProvider
    ? document.querySelector('.catKey[data-cat="' + cat + '"]').value.trim()
    : $('defKey').value.trim()
  if (!provider) return
  await fetchModelsFor(provider, key, '', $('mixModelHint'))
  setCategoryModelDefault(cat, force)
}
function setMode(m) {
  mode = m
  document.querySelectorAll('.segbtn').forEach(b => b.classList.toggle('on', b.dataset.mode === m))
  $('paneSingle').classList.toggle('hidden', m !== 'single')
  $('paneMixed').classList.toggle('hidden', m !== 'mixed')
}
function buildCatRows() {
  $('catRows').innerHTML = CATEGORIES.map(c => `
    <div class="catrow">
      <div class="catlabel">${categoryTitle(c)}<span class="opt">${stageText(c.stages)}</span></div>
      <div class="catfields">
        <select class="catProvider" data-cat="${c.key}">${provOptions(true)}</select>
        <input class="catKey hidden" data-cat="${c.key}" type="password" placeholder="该任务 API Key" autocomplete="off">
        <input class="catModel" data-cat="${c.key}" type="text" list="modelList-${c.key}" placeholder="自动选择模型">
        <datalist id="modelList-${c.key}"></datalist>
      </div>
    </div>`).join('')
  document.querySelectorAll('.catProvider').forEach(sel => sel.onchange = () => {
    const cat = sel.dataset.cat
    document.querySelector('.catKey[data-cat="' + cat + '"]').classList.toggle('hidden', !sel.value)
    fetchCatModels(cat, true)
  })
  document.querySelectorAll('.catKey').forEach(input => input.onblur = () => fetchCatModels(input.dataset.cat, false))
  document.querySelectorAll('.catModel').forEach(input => input.oninput = () => { input.dataset.touched = '1' })
  refreshCategoryDefaults(true, false)
}
function categoryMeta(cat) {
  return CATEGORIES.find(c => c.key === cat) || {}
}
function categoryProvider(cat) {
  return document.querySelector('.catProvider[data-cat="' + cat + '"]').value || $('defProvider').value
}
function setCategoryModelDefault(cat, force) {
  const input = document.querySelector('.catModel[data-cat="' + cat + '"]')
  if (!input || (!force && input.dataset.touched)) return
  const meta = categoryMeta(cat)
  const p = providerByName(categoryProvider(cat)) || {}
  const suggestion = p.costEffective && p.costEffective.category && p.costEffective.category[cat]
    ? p.costEffective.category[cat]
    : p.models && p.models[meta.tierHint]
  const dl = $('modelList-' + cat)
  if (dl) dl.innerHTML = optionListFor(p)
  input.placeholder = suggestion
    ? ('默认 ' + suggestion)
    : ('自动选择，如 ' + hintModel(meta.tierHint))
  if (suggestion) input.value = suggestion
}
function refreshCategoryDefaults(force, onlyDefaultProvider) {
  for (const c of CATEGORIES) {
    const explicit = document.querySelector('.catProvider[data-cat="' + c.key + '"]').value
    if (onlyDefaultProvider && explicit) continue
    setCategoryModelDefault(c.key, force)
  }
}

function collectModel() {
  if (mode === 'single') {
    const apiKey = $('apiKey').value.trim()
    if (!apiKey) throw new Error('请填写 API Key。')
    return { provider: $('provider').value, apiKey, baseURL: $('baseURL').value.trim() || undefined, tavilyKey: $('tavilyKey').value.trim() || undefined, models: parseModels($('models').value) }
  }
  const defProvider = $('defProvider').value, defKey = $('defKey').value.trim()
  const categories = {}
  for (const c of CATEGORIES) {
    const provSel = document.querySelector('.catProvider[data-cat="' + c.key + '"]').value
    const keyVal = document.querySelector('.catKey[data-cat="' + c.key + '"]').value.trim()
    const modelOverride = document.querySelector('.catModel[data-cat="' + c.key + '"]').value.trim() || undefined
    const provider = provSel || defProvider
    const apiKey = provSel ? keyVal : defKey
    if (!provider) throw new Error('请选择「' + categoryTitle(c) + '」的服务商。')
    if (!apiKey) throw new Error('请填写「' + categoryTitle(c) + '」的 API Key。')
    categories[c.key] = { provider, apiKey, modelOverride }
  }
  const t = $('mixTavily').value.trim()
  if (t && categories.web) categories.web.tavilyKey = t
  return { categories }
}

// file picking → base64
const fb = $('filebox')
fb.onclick = () => $('files').click()
fb.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') $('files').click() }
fb.ondragover = (e) => { e.preventDefault(); fb.classList.add('has') }
fb.ondragleave = () => { if (!picked.length) fb.classList.remove('has') }
fb.ondrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files) }
$('files').onchange = (e) => handleFiles(e.target.files)

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader()
    r.onload = () => {
      const bytes = new Uint8Array(r.result); let bin = ''; const C = 0x8000
      for (let i = 0; i < bytes.length; i += C) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + C))
      res(btoa(bin))
    }
    r.onerror = rej; r.readAsArrayBuffer(file)
  })
}
async function handleFiles(fileList) {
  const arr = Array.from(fileList || [])
  if (!arr.length) return
  picked = []
  for (const f of arr) picked.push({ name: f.name, base64: await fileToBase64(f) })
  fb.classList.add('has')
  fb.innerHTML = '<b>' + picked.length + ' 份文件</b> · 重新选择'
  $('fileList').innerHTML = picked.map(p => `<li>· ${esc(p.name)}</li>`).join('')
}

function getScope() {
  const scope = ['refine']
  document.querySelectorAll('.checks input[value]').forEach(c => { if (c.checked) scope.push(c.value) })
  return scope
}
function parseModels(s) {
  s = (s || '').trim(); if (!s) return undefined
  const m = {}; for (const pair of s.split(',')) { const [k, v] = pair.split('='); if (k && v) m[k.trim()] = v.trim() }
  return Object.keys(m).length ? m : undefined
}

const log = (msg, cls) => { const c = $('console'); const span = document.createElement('div'); if (cls) span.className = cls; span.textContent = msg; c.appendChild(span); c.scrollTop = c.scrollHeight; return span }

// --- run clock: a live elapsed timer so a slow phase reads as "still running", not hung ---
let runStart = 0, phaseStart = 0, phaseEl = null, phaseTitle = '', clockTick = null
const fmtDur = (ms) => { const s = Math.max(0, Math.floor(ms / 1000)); return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0') }
function updateClock() {
  if (!runStart) return
  const t = Date.now()
  const el = $('elapsed'); if (el) el.textContent = '总用时 ' + fmtDur(t - runStart)
  if (phaseEl) phaseEl.textContent = '▸ ' + phaseTitle + '   ' + fmtDur(t - phaseStart)   // active phase counts up in place
}
function startClock() { runStart = Date.now(); phaseStart = runStart; phaseEl = null; phaseTitle = ''; clearInterval(clockTick); clockTick = setInterval(updateClock, 1000); updateClock() }
function freezePhase() { if (phaseEl) phaseEl.textContent = '▸ ' + phaseTitle + '   用时 ' + fmtDur(Date.now() - phaseStart) }   // pin the finished phase's duration
function markPhase(title) { freezePhase(); phaseTitle = title; phaseStart = Date.now(); phaseEl = log('▸ ' + title, 'ph') }
function stopClock() { freezePhase(); clearInterval(clockTick); clockTick = null; const el = $('elapsed'); if (el && runStart) el.textContent = '总用时 ' + fmtDur(Date.now() - runStart); runStart = 0; phaseEl = null }

$('run').onclick = run
{ const lastOut = localStorage.getItem('lpr_out'); if (lastOut && !$('out').value) $('out').value = lastOut }   // 回填上次的输出位置
async function run() {
  if (!picked.length) return setStatus('请先选择文件。', true)
  if (!$('topic').value.trim()) return setStatus('请填写主题。', true)
  const outVal = $('out').value.trim()
  if (outVal) localStorage.setItem('lpr_out', outVal)   // 记住上次的输出位置
  let modelParams
  try { modelParams = collectModel() } catch (e) { return setStatus(e.message, true) }

  const params = {
    ...modelParams,
    files: picked,
    topic: $('topic').value.trim(),
    date: $('date').value.trim(),
    background: $('background').value.trim(),
    scope: getScope(),
    verifyDepth: $('verify').value,
    headingPolicy: $('heading').value,
    outputDir: outVal || undefined,
    fresh: $('fresh').checked,
    chunkMode: $('chunkSpeed').checked ? 'speed' : undefined,
    concurrency: $('concurrency').value ? Number($('concurrency').value) : undefined,
  }

  $('run').disabled = true; setStatus('运行中... 大文件可能需要几分钟。')
  $('consoleCard').style.display = 'block'; $('console').innerHTML = ''
  $('resultCard').style.display = 'none'; $('result').innerHTML = ''
  startClock()

  try {
    const resp = await fetch('/api/run', { method: 'POST', headers: jsonHeaders(), body: JSON.stringify(params) })
    const reader = resp.body.getReader(); const dec = new TextDecoder(); let buf = ''
    while (true) {
      const { done, value } = await reader.read(); if (done) break
      buf += dec.decode(value, { stream: true })
      let idx
      while ((idx = buf.indexOf('\n\n')) >= 0) { handleEvent(buf.slice(0, idx)); buf = buf.slice(idx + 2) }
    }
  } catch (e) { log('连接中断：' + e.message, 'er') }
  finally { stopClock(); $('run').disabled = false; setStatus('') }
}

function handleEvent(raw) {
  let ev = 'message', data = ''
  for (const line of raw.split('\n')) {
    if (line.startsWith('event: ')) ev = line.slice(7)
    else if (line.startsWith('data: ')) data += line.slice(6)
  }
  let obj = {}; try { obj = JSON.parse(data) } catch {}
  if (ev === 'phase') markPhase(obj.title)
  else if (ev === 'log') log('  ' + obj.message)
  else if (ev === 'error') { log('✗ ' + obj.message, 'er'); setStatus(obj.message, true) }
  else if (ev === 'result') renderResult(obj)
}

function renderResult(r) {
  $('resultCard').style.display = 'block'
  const out = []
  out.push(`<p>模型：<b>${esc(r.providerInfo ? r.providerInfo.label : r.provider)}</b>　输出：<code>${esc(r.outputDir)}</code> <button class="ghost" id="openBtn">打开文件夹</button></p>`)
  out.push(`<h3 class="ok">精校稿 ${Number(r.refined.length) || 0} 份</h3><ul>` + r.refined.map(x => `<li><code>${esc(x.outPath || x.path)}</code></li>`).join('') + '</ul>')
  if (r.glossaryPath) out.push(`<p>校对表：<code>${esc(r.glossaryPath)}</code></p>`)
  if (r.reviewPath) out.push(`<p>待处理清单：<code>${esc(r.reviewPath)}</code></p>`)
  if (r.manifestPath) out.push(`<p>运行记录：<code>${esc(r.manifestPath)}</code></p>`)
  const warn = (label, items, fmt) => { if (items && items.length) out.push(`<h3 class="warn">${esc(label)}（${items.length}）</h3><ul>` + items.map(fmt || (x => `<li>${esc(typeof x === 'string' ? x : JSON.stringify(x))}</li>`)).join('') + '</ul>') }
  warn('未完成', r.failed)
  warn('疑似截断', r.incomplete, x => `<li><code>${esc(x.path)}</code>${x.note ? '：' + esc(x.note) : ''}</li>`)
  warn('结尾待核', r.unchecked, x => `<li><code>${esc(x)}</code></li>`)
  warn('侦察异常', r.scoutSuspect)
  warn('原文已有小标题', r.headingConflicts)
  warn('疑似同指', r.suspectedDuplicates, x => `<li>${esc((x.members || []).join(' / '))}</li>`)
  warn('未完成联网核实', r.networkUnverified, x => `<li>${esc(typeof x === 'string' ? x : (x.query || JSON.stringify(x)))}</li>`)
  if (r.logic && r.logic.length) out.push(`<h3>逻辑顺序稿 ${r.logic.filter(l => l.path).length}/${r.logic.length}</h3><ul>` + r.logic.filter(l => l.path).map(l => `<li><code>${esc(l.path)}</code></li>`).join('') + '</ul>')
  if (r.summary) out.push(`<p>访谈总结：${esc(String(r.summary).split('\n')[0])}</p>`)
  if (r.timeline) out.push(`<p>时间线：${esc(String(r.timeline).split('\n')[0])}</p>`)
  if (r.openQuestions && r.openQuestions.length) out.push(`<h3>待确认（${r.openQuestions.length}）</h3><ul>` + r.openQuestions.map(q => `<li>${esc(typeof q === 'string' ? q : JSON.stringify(q))}</li>`).join('') + '</ul>')
  if (r.usage) out.push(`<p class="hint">用量：${r.usage.agents} 次调用 · 输入 ${(r.usage.input || 0).toLocaleString()} / 输出 ${(r.usage.output || 0).toLocaleString()} tokens</p>`)
  $('result').innerHTML = out.join('')
  const ob = $('openBtn'); if (ob) ob.onclick = () => fetch('/api/open', { method: 'POST', headers: jsonHeaders(), body: JSON.stringify({ path: r.outputDir }) })
}
function esc(s) { return String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])) }
function escAttr(s) { return esc(s).replace(/"/g, '&quot;') }
function setStatus(msg, isErr) { const s = $('status'); s.textContent = msg || ''; s.style.color = isErr ? 'var(--err)' : 'var(--muted)' }

loadConfig()
</script>
</body>
</html>
