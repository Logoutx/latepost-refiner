<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>访谈转录精校 · 本地版</title>
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#f6f5f2" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#16140f" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="访谈精校">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
  :root {
    --bg: #f6f5f2; --card: #fffefb; --ink: #1c1a17; --muted: #6b6660; --line: #e3ded6;
    --accent: #b4532a; --accent-ink: #fff; --ok: #2f7d4f; --warn: #b07203; --err: #b3261e;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, "PingFang SC", "Segoe UI", system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#16140f; --card:#211e18; --ink:#ece7df; --muted:#9a948a; --line:#34302a;
            --accent:#d9784e; --ok:#5fb27e; --warn:#d6a24a; --err:#e07a72; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); line-height: 1.5; }
  .wrap { max-width: 860px; margin: 0 auto; padding: 28px 20px 80px; }
  header h1 { font-size: 22px; margin: 0 0 4px; letter-spacing: .2px; }
  header p { margin: 0; color: var(--muted); font-size: 13px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 18px 18px 20px; margin-top: 18px; }
  .card h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin: 0 0 14px; font-weight: 600; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 12px 0 5px; }
  label .opt { color: var(--muted); font-weight: 400; }
  input[type=text], input[type=password], input[type=number], select, textarea {
    width: 100%; padding: 9px 11px; border: 1px solid var(--line); border-radius: 8px;
    background: var(--bg); color: var(--ink); font: inherit; font-size: 14px;
  }
  textarea { resize: vertical; min-height: 56px; }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .hint { font-size: 12px; color: var(--muted); margin: 5px 0 0; }
  .checks { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 6px; }
  .checks label { display: inline-flex; align-items: center; gap: 6px; margin: 0; font-weight: 500; }
  .checks input { width: auto; }
  .filebox { border: 1.5px dashed var(--line); border-radius: 10px; padding: 16px; text-align: center; cursor: pointer; color: var(--muted); font-size: 13px; }
  .filebox.has { border-style: solid; color: var(--ink); text-align: left; }
  .filebox b { color: var(--ink); }
  #fileList { margin: 8px 0 0; padding: 0; list-style: none; font-size: 13px; }
  #fileList li { padding: 2px 0; color: var(--muted); }
  .actions { display: flex; align-items: center; gap: 14px; margin-top: 20px; }
  button.run { background: var(--accent); color: var(--accent-ink); border: none; border-radius: 9px; padding: 11px 22px; font: inherit; font-weight: 600; font-size: 15px; cursor: pointer; }
  button.run:disabled { opacity: .5; cursor: default; }
  button.ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 8px; padding: 8px 14px; font: inherit; font-size: 13px; cursor: pointer; }
  details summary { cursor: pointer; font-size: 13px; color: var(--muted); font-weight: 600; }
  details[open] summary { margin-bottom: 8px; }
  #console { font-family: var(--mono); font-size: 12.5px; background: #0e0d0b; color: #d7cfc2; border-radius: 10px; padding: 14px; height: 240px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
  #console .ph { color: #e0925f; font-weight: 700; }
  #console .er { color: #ef8d84; }
  #result { font-size: 14px; }
  #result .ok { color: var(--ok); } #result .warn { color: var(--warn); } #result .er { color: var(--err); }
  #result h3 { font-size: 14px; margin: 14px 0 6px; }
  #result ul { margin: 4px 0; padding-left: 20px; } #result li { margin: 2px 0; }
  code { font-family: var(--mono); font-size: 12.5px; background: var(--bg); padding: 1px 5px; border-radius: 4px; }
  .pill { display: inline-block; font-size: 11px; padding: 1px 8px; border-radius: 99px; border: 1px solid var(--line); color: var(--muted); margin-left: 8px; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>访谈转录精校 <span class="pill">本地</span></h1>
    <p>清理口语、统一名词、保留事实。</p>
  </header>

  <div class="card">
    <h2>密钥</h2>
    <div class="row">
      <div>
        <label>DeepSeek API Key</label>
        <input type="password" id="apiKey" placeholder="仅本次使用，不保存" autocomplete="off">
      </div>
      <div>
        <label>Tavily API Key <span class="opt">联网核实/时间线用，可留空</span></label>
        <input type="password" id="tavilyKey" placeholder="留空则不联网核实" autocomplete="off">
      </div>
    </div>
    <p class="hint">DeepSeek 由中国境内公司运营，转录全文会传输至其服务器处理并受当地法规约束（含内容审查）。涉敏感话题或需保护信源的访谈请慎用。</p>
    <p class="hint">未填 Tavily 时，标准/深度核实会降级为不联网（精校不受影响）。</p>
  </div>

  <div class="card">
    <h2>输入</h2>
    <div class="filebox" id="filebox" tabindex="0">
      选择转录文件<br><span class="opt">.txt / .md / .srt / .docx / .pptx / .xlsx / .pdf</span>
    </div>
    <input type="file" id="files" multiple class="hidden"
           accept=".txt,.md,.srt,.docx,.pptx,.xlsx,.pdf,text/plain,text/markdown">
    <ul id="fileList"></ul>
    <p class="hint" id="fileEstimate"></p>
    <div class="row" style="margin-top:8px">
      <div><label>主题 <span class="opt">用于文件名</span></label><input type="text" id="topic" placeholder="示例公司"></div>
      <div><label>采访时间 <span class="opt">YYYY-MM</span></label><input type="text" id="date" placeholder="2025-02"></div>
    </div>
    <label>背景 <span class="opt">给模型一点上下文</span></label>
    <textarea id="background" placeholder="例如：示例公司跨部门访谈，受访者负责渠道运营。"></textarea>
  </div>

  <div class="card">
    <h2>产出</h2>
    <label>交付内容</label>
    <div class="checks">
      <label><input type="checkbox" checked disabled> 精校稿</label>
      <label><input type="checkbox" class="scopeChk" value="logic"> 逻辑顺序稿</label>
      <label><input type="checkbox" class="scopeChk" value="summary"> 总结</label>
      <label><input type="checkbox" class="scopeChk" value="timeline"> 时间线</label>
    </div>
    <div class="row3" style="margin-top:12px">
      <div><label>核实范围</label><select id="verify"><option value="key">标准（推荐）</option><option value="deep">深度</option><option value="none">关闭</option></select></div>
      <div><label>小标题</label><select id="heading"><option value="none">自动生成</option><option value="keep">保留原文</option><option value="regenerate">重新生成</option></select></div>
      <div><label>并发 <span class="opt">可选</span></label><input type="number" id="concurrency" min="1" placeholder="自动"></div>
    </div>
    <p class="hint">标准/深度核实会用于精校稿；关闭适合更快、更省额度或不联网的整理。</p>
    <label>输出位置 <span class="opt">留空用 Downloads/&lt;主题&gt;</span></label>
    <input type="text" id="out" placeholder="留空则保存到 ~/Downloads/<主题>">
    <div class="checks" style="margin-top:10px"><label><input type="checkbox" id="fresh"> 重新生成校对表</label><label title="把超过约 12000 字的文件拆成 2 块并行精校。多文件批量更快，但更费额度；单文件提升有限。"><input type="checkbox" id="chunkSpeed"> 大文件分块并行（提速·更费额度）</label></div>
  </div>

  <div class="actions">
    <button class="run" id="run">开始</button>
    <span class="hint" id="status"></span>
  </div>

  <div class="card" id="consoleCard" style="display:none">
    <h2>进度 <span id="elapsed" class="hint" style="font-variant-numeric:tabular-nums;font-weight:normal"></span></h2>
    <div id="console"></div>
  </div>

  <div class="card" id="resultCard" style="display:none">
    <h2>结果</h2>
    <div id="result"></div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id)
const API_TOKEN = window.__TRANSCRIBER_TOKEN__ || ''
const jsonHeaders = () => ({ 'Content-Type': 'application/json', 'X-Transcriber-Token': API_TOKEN })
let picked = [] // {name, base64}

function collectModel() {
  const apiKey = $('apiKey').value.trim()
  if (!apiKey) throw new Error('请填写 DeepSeek API Key。')
  return { apiKey, tavilyKey: $('tavilyKey').value.trim() || undefined }
}

// file picking → base64
const fb = $('filebox')
fb.onclick = () => $('files').click()
fb.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') $('files').click() }
fb.ondragover = (e) => { e.preventDefault(); fb.classList.add('has') }
fb.ondragleave = () => { if (!picked.length) fb.classList.remove('has') }
fb.ondrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files) }
$('files').onchange = (e) => handleFiles(e.target.files)

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader()
    r.onload = () => {
      const bytes = new Uint8Array(r.result); let bin = ''; const C = 0x8000
      for (let i = 0; i < bytes.length; i += C) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + C))
      res(btoa(bin))
    }
    r.onerror = rej; r.readAsArrayBuffer(file)
  })
}
// content-字数：汉字数 + 每个连续英文/数字串各算 1（不是逐字符）——与项目其它地方统一的体量口径。
function contentWordCount(text) {
  const hanzi = text.match(/[一-龥]/g) || []
  const runs = text.match(/[A-Za-z0-9]+/g) || []
  return hanzi.length + runs.length
}
// base64 → UTF-8 text; returns null on decode failure (e.g. a binary file like .docx/.pdf —
// those are not plain UTF-8 text, so the estimate is skipped silently for them, never blocking).
function decodeBase64Text(b64) {
  try {
    const bin = atob(b64)
    const bytes = new Uint8Array(bin.length)
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i)
    return new TextDecoder('utf-8', { fatal: true }).decode(bytes)
  } catch {
    return null
  }
}
// Rough duration: minutes = 5 + 0.5 * (字数/1000), x1.6 if summary/timeline/logic scope is on,
// shown as a ±35% range around that midpoint so it reads as an honest estimate, not a promise.
function updateFileEstimate() {
  const el = $('fileEstimate')
  if (!el) return
  if (!picked.length) { el.textContent = ''; return }
  let total = 0, counted = 0
  for (const p of picked) {
    const text = decodeBase64Text(p.base64)
    if (text === null) continue   // skip non-text files silently
    total += contentWordCount(text)
    counted++
  }
  if (!counted) { el.textContent = ''; return }
  const extraScope = Array.from(document.querySelectorAll('.scopeChk')).some(c => c.checked)
  let minutes = 5 + 0.5 * (total / 1000)
  if (extraScope) minutes *= 1.6
  const lo = Math.max(1, Math.round(minutes * 0.65))
  const hi = Math.round(minutes * 1.35)
  el.textContent = `共 ${picked.length} 份 · 约 ${total} 字 · 预计 ${lo}-${hi} 分钟（粗估）`
}
async function handleFiles(fileList) {
  const arr = Array.from(fileList || [])
  if (!arr.length) return
  picked = []
  for (const f of arr) picked.push({ name: f.name, base64: await fileToBase64(f) })
  fb.classList.add('has')
  fb.innerHTML = '<b>' + picked.length + ' 份文件</b> · 重新选择'
  $('fileList').innerHTML = picked.map(p => `<li>· ${esc(p.name)}</li>`).join('')
  updateFileEstimate()
}
document.querySelectorAll('.scopeChk').forEach(c => c.addEventListener('change', updateFileEstimate))

function getScope() {
  const scope = ['refine']
  document.querySelectorAll('.scopeChk').forEach(c => { if (c.checked) scope.push(c.value) })
  return scope
}

const log = (msg, cls) => { const c = $('console'); const span = document.createElement('div'); if (cls) span.className = cls; span.textContent = msg; c.appendChild(span); c.scrollTop = c.scrollHeight; return span }

// --- run clock: a live elapsed timer so a slow phase reads as "still running", not hung ---
let runStart = 0, phaseStart = 0, phaseEl = null, phaseTitle = '', clockTick = null
const fmtDur = (ms) => { const s = Math.max(0, Math.floor(ms / 1000)); return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0') }
function updateClock() {
  if (!runStart) return
  const t = Date.now()
  const el = $('elapsed'); if (el) el.textContent = '总用时 ' + fmtDur(t - runStart)
  if (phaseEl) phaseEl.textContent = '▸ ' + phaseTitle + '   ' + fmtDur(t - phaseStart)   // active phase counts up in place
}
function startClock() { runStart = Date.now(); phaseStart = runStart; phaseEl = null; phaseTitle = ''; clearInterval(clockTick); clockTick = setInterval(updateClock, 1000); updateClock() }
function freezePhase() { if (phaseEl) phaseEl.textContent = '▸ ' + phaseTitle + '   用时 ' + fmtDur(Date.now() - phaseStart) }   // pin the finished phase's duration
function markPhase(title) { freezePhase(); phaseTitle = title; phaseStart = Date.now(); phaseEl = log('▸ ' + title, 'ph') }
function stopClock() { freezePhase(); clearInterval(clockTick); clockTick = null; const el = $('elapsed'); if (el && runStart) el.textContent = '总用时 ' + fmtDur(Date.now() - runStart); runStart = 0; phaseEl = null }

$('run').onclick = run
async function run() {
  if (!picked.length) return setStatus('请先选择文件。', true)
  if (!$('topic').value.trim()) return setStatus('请填写主题。', true)
  const outVal = $('out').value.trim()
  if (outVal) localStorage.setItem('lpr_out', outVal)   // 记住上次的输出位置
  let modelParams
  try { modelParams = collectModel() } catch (e) { return setStatus(e.message, true) }

  const params = {
    ...modelParams,
    files: picked,
    topic: $('topic').value.trim(),
    date: $('date').value.trim(),
    background: $('background').value.trim(),
    scope: getScope(),
    verifyDepth: $('verify').value,
    headingPolicy: $('heading').value,
    outputDir: outVal || undefined,
    fresh: $('fresh').checked,
    chunkMode: $('chunkSpeed').checked ? 'speed' : undefined,
    concurrency: $('concurrency').value ? Number($('concurrency').value) : undefined,
  }

  $('run').disabled = true; setStatus('运行中... 大文件可能需要几分钟。')
  $('consoleCard').style.display = 'block'; $('console').innerHTML = ''
  $('resultCard').style.display = 'none'; $('result').innerHTML = ''
  startClock()

  try {
    const resp = await fetch('/api/run', { method: 'POST', headers: jsonHeaders(), body: JSON.stringify(params) })
    const reader = resp.body.getReader(); const dec = new TextDecoder(); let buf = ''
    while (true) {
      const { done, value } = await reader.read(); if (done) break
      buf += dec.decode(value, { stream: true })
      let idx
      while ((idx = buf.indexOf('\n\n')) >= 0) { handleEvent(buf.slice(0, idx)); buf = buf.slice(idx + 2) }
    }
  } catch (e) { log('连接中断：' + e.message, 'er') }
  finally { stopClock(); $('run').disabled = false; setStatus('') }
}

function handleEvent(raw) {
  let ev = 'message', data = ''
  for (const line of raw.split('\n')) {
    if (line.startsWith('event: ')) ev = line.slice(7)
    else if (line.startsWith('data: ')) data += line.slice(6)
  }
  let obj = {}; try { obj = JSON.parse(data) } catch {}
  if (ev === 'phase') markPhase(obj.title)
  else if (ev === 'log') log('  ' + obj.message)
  else if (ev === 'error') { log('✗ ' + obj.message, 'er'); setStatus(obj.message, true) }
  else if (ev === 'result') renderResult(obj)
}

function renderResult(r) {
  $('resultCard').style.display = 'block'
  const out = []
  out.push(`<p>模型：<b>${esc(r.providerInfo ? r.providerInfo.label : r.provider)}</b>　输出：<code>${esc(r.outputDir)}</code> <button class="ghost" id="openBtn">打开文件夹</button></p>`)
  out.push(`<h3 class="ok">精校稿 ${Number(r.refined.length) || 0} 份</h3><ul>` + r.refined.map(x => `<li><code>${esc(x.outPath || x.path)}</code></li>`).join('') + '</ul>')
  if (r.glossaryPath) out.push(`<p>校对表：<code>${esc(r.glossaryPath)}</code></p>`)
  if (r.reviewPath) out.push(`<p>待处理清单：<code>${esc(r.reviewPath)}</code></p>`)
  if (r.manifestPath) out.push(`<p>运行记录：<code>${esc(r.manifestPath)}</code></p>`)
  const warn = (label, items, fmt) => { if (items && items.length) out.push(`<h3 class="warn">${esc(label)}（${items.length}）</h3><ul>` + items.map(fmt || (x => `<li>${esc(typeof x === 'string' ? x : JSON.stringify(x))}</li>`)).join('') + '</ul>') }
  warn('未完成', r.failed)
  warn('疑似截断', r.incomplete, x => `<li><code>${esc(x.path)}</code>${x.note ? '：' + esc(x.note) : ''}</li>`)
  warn('结尾待核', r.unchecked, x => `<li><code>${esc(x)}</code></li>`)
  warn('侦察异常', r.scoutSuspect)
  warn('原文已有小标题', r.headingConflicts)
  warn('疑似同指', r.suspectedDuplicates, x => `<li>${esc((x.members || []).join(' / '))}</li>`)
  warn('未完成联网核实', r.networkUnverified, x => `<li>${esc(typeof x === 'string' ? x : (x.query || JSON.stringify(x)))}</li>`)
  if (r.audit && r.audit.files) {
    warn('成稿质量抽查未过', r.audit.files.filter(x => x.status === 'fail'), x => `<li><code>${esc(x.file || '')}</code>：${esc((x.failed || []).join(' / '))}${x.metrics ? ` · charRatio=${esc(x.metrics.charRatio)}` : ''}</li>`)
  }
  if (r.qualityRepair && r.qualityRepair.attempts && r.qualityRepair.attempts.length) {
    warn('自动修复记录', r.qualityRepair.attempts, x => `<li><code>${esc(x.file || '')}</code>：第 ${esc(x.attempt || '?')} 轮 ${esc(x.action || 'repair')} / ${esc(x.model || '?')} · ${x.ok ? '已尝试写回' : '失败'}</li>`)
  }
  if (r.logic && r.logic.length) out.push(`<h3>逻辑顺序稿 ${r.logic.filter(l => l.path).length}/${r.logic.length}</h3><ul>` + r.logic.filter(l => l.path).map(l => `<li><code>${esc(l.path)}</code></li>`).join('') + '</ul>')
  if (r.summary) out.push(`<p>访谈总结：${esc(String(r.summary).split('\n')[0])}</p>`)
  if (r.timeline) out.push(`<p>时间线：${esc(String(r.timeline).split('\n')[0])}</p>`)
  if (r.openQuestions && r.openQuestions.length) out.push(`<h3>待确认（${r.openQuestions.length}）</h3><ul>` + r.openQuestions.map(q => `<li>${esc(typeof q === 'string' ? q : JSON.stringify(q))}</li>`).join('') + '</ul>')
  if (r.usage) out.push(`<p class="hint">用量：${r.usage.agents} 次调用 · 输入 ${(r.usage.input || 0).toLocaleString()} / 输出 ${(r.usage.output || 0).toLocaleString()} tokens</p>`)
  $('result').innerHTML = out.join('')
  const ob = $('openBtn'); if (ob) ob.onclick = () => fetch('/api/open', { method: 'POST', headers: jsonHeaders(), body: JSON.stringify({ path: r.outputDir }) })
}
function esc(s) { return String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])) }
function setStatus(msg, isErr) { const s = $('status'); s.textContent = msg || ''; s.style.color = isErr ? 'var(--err)' : 'var(--muted)' }

// --- persist non-secret settings across reloads (localStorage, lpr_ prefix) ---
// Never persist: apiKey / tavilyKey or any input[type=password] — those stay in-memory only for the run.
function persistField(id, key) {
  const el = $(id)
  if (!el) return
  if (el.type === 'password') return   // never persist secrets, even if mis-wired
  const isCheck = el.type === 'checkbox'
  const saved = localStorage.getItem(key)
  if (saved !== null) {
    if (isCheck) el.checked = saved === '1'; else el.value = saved
  }
  const save = () => localStorage.setItem(key, isCheck ? (el.checked ? '1' : '0') : el.value)
  el.addEventListener('change', save)
  if (!isCheck) el.addEventListener('blur', save)
}
function restoreScope() {
  const saved = localStorage.getItem('lpr_scope')
  if (saved === null) return
  let vals = []
  try { vals = JSON.parse(saved) } catch { /* ignore malformed */ }
  document.querySelectorAll('.scopeChk').forEach(c => { c.checked = vals.includes(c.value) })
}
function saveScope() {
  const vals = Array.from(document.querySelectorAll('.scopeChk')).filter(c => c.checked).map(c => c.value)
  localStorage.setItem('lpr_scope', JSON.stringify(vals))
}
function wirePersistence() {
  { const lastOut = localStorage.getItem('lpr_out'); if (lastOut && !$('out').value) $('out').value = lastOut }   // 回填上次的输出位置（既有逻辑，key 名保持不变）
  ;['verify', 'heading', 'topic', 'date', 'background', 'chunkSpeed'].forEach(id => persistField(id, 'lpr_' + id))
  restoreScope()
  document.querySelectorAll('.scopeChk').forEach(c => c.addEventListener('change', saveScope))
}
wirePersistence()
